name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Catch upstream-stable-branch regressions even when nothing in this
  # repo changed (we resolve to the highest patch tag at run time).
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  build:
    name: build against asterisk ${{ matrix.asterisk_branch }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    env:
      OBJ_DIR: obj
      MODULE_BUILD_DIR: obj
      DOC_XML: obj/doc/res_pjsip_cisco-en_US.xml
    strategy:
      fail-fast: false
      matrix:
        # asterisk_branch resolves (at job-start time) to the highest
        # X.Y.Z stable tag matching the prefix.
        #
        # runner is picked so that the cell's apt asterisk MAJOR
        # version matches asterisk_branch — which then lets the
        # downstream module-load smoke (gated on major match) actually
        # exercise this cell's .so files against a real running
        # asterisk binary. Current alignment (verified against
        # launchpad.net/ubuntu/+source/asterisk, every pocket):
        #
        #   ubuntu-22.04 (jammy) — asterisk 18.10.0 only
        #   ubuntu-24.04 (noble) — asterisk 20.6.0 only
        #
        # No current Ubuntu release packages asterisk 22 or 23, in
        # any pocket including -backports / -proposed. Cells 22 and
        # 23 therefore stay runtime-skipped; their build-time ABI
        # check (compile against the resolved upstream tag) still
        # applies, so a header-level regression would still fail
        # the build.
        #
        # The asterisk-20 cell uses noble rather than jammy because
        # jammy's apt asterisk is major 18, which doesn't match.
        # When Ubuntu eventually packages a higher major (or asterisk
        # lands in jammy/noble -backports), update the runner entry
        # for the matching cell; the gate logic below picks it up
        # automatically. Stable-branch regressions surface within
        # a week via the cron.
        include:
          - asterisk_branch: '20'
            runner: ubuntu-24.04
          - asterisk_branch: '22'
            runner: ubuntu-24.04
          - asterisk_branch: '23'
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: install build deps
        # Asterisk's ./configure needs the standard set of dev libs
        # before it'll generate the autogenerated headers
        # (autoconfig.h, buildopts.h, asteriskselect.h) that our
        # modules transitively include via res_pjsip.h. We don't need
        # to actually compile asterisk, just configure it.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            wget \
            curl \
            jq \
            ca-certificates \
            libxml2-dev \
            libxml2-utils \
            libxslt1-dev \
            libsqlite3-dev \
            libssl-dev \
            libedit-dev \
            uuid-dev \
            libjansson-dev

      - name: resolve latest ${{ matrix.asterisk_branch }} tag
        id: resolve
        run: |
          # The /tags?per_page=100 endpoint only returns the most
          # recently created tags (certified-* releases dominate).
          # /git/matching-refs/tags/<prefix> returns ALL tags starting
          # with <prefix>, so e.g. branch=22 returns every 22.* tag
          # (22.0.0 ... 22.9.0 ... 22.10.0 ...) including pre/rc
          # variants - we then filter to the X.Y.Z stable form and
          # sort -V for the highest minor+patch.
          BRANCH='${{ matrix.asterisk_branch }}'
          TAG=$(curl -fsSL \
                  "https://api.github.com/repos/asterisk/asterisk/git/matching-refs/tags/${BRANCH}" \
              | jq -r '.[].ref' \
              | sed 's|^refs/tags/||' \
              | grep -E "^${BRANCH//./\\.}(\.[0-9]+)+$" \
              | sort -V | tail -1)
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve a ${BRANCH}.x release tag from github.com/asterisk/asterisk"
            exit 1
          fi
          echo "asterisk_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved asterisk-${TAG} for branch ${BRANCH}"

      - name: fetch asterisk source
        run: |
          TAG='${{ steps.resolve.outputs.asterisk_tag }}'
          wget -q "https://github.com/asterisk/asterisk/archive/refs/tags/${TAG}.tar.gz" \
              -O asterisk.tgz
          tar xzf asterisk.tgz
          mv "asterisk-${TAG}" asterisk-src

      - name: configure asterisk + stub buildopts.h
        # ./configure generates autoconfig.h (via autoheader) but NOT
        # buildopts.h - that one is generated by
        # build_tools/make_buildopts_h during `make`, after menuselect
        # runs. Pulling in menuselect just to compile .so headers
        # would mean libnewt-dev / curses for a TUI we never display,
        # so we stub it with what asterisk's default-options output
        # looks like. OPTIONAL_API=1 is what every stock asterisk
        # install ends up with; AST_BUILDOPT_SUM is required by
        # AST_MODULE_INFO and is just a string identifier (no API
        # impact - any non-empty value works for CI).
        #
        # NOTE: we deliberately DO NOT pass --without-pjproject-bundled.
        # That flag suppresses the block in configure that defines
        # HAVE_PJSIP_AUTH_NEW_DIGESTS / HAVE_PJSIP_TLS_TRANSPORT_RESTART
        # / etc. - flags that gate polyfills in res_pjsip.h. Without
        # them, asterisk emits its own pjsip_auth_algorithm_type enum
        # and that conflicts with pjproject 2.16's real definitions at
        # compile time. Letting configure assume bundled is safe; we
        # never actually `make` asterisk so the bundled tarball is
        # never extracted.
        run: |
          cd asterisk-src
          ./configure --disable-xmldoc >/dev/null
          cat > include/asterisk/buildopts.h <<'EOF'
          /*
           * buildopts.h - CI stub matching asterisk's default ./configure
           * output. We do not run menuselect / make in CI; this stub
           * satisfies includes from autoconfig.h.
           */
          #define OPTIONAL_API 1
          #define AST_BUILDOPT_SUM ""
          #define AST_BUILDOPTS "OPTIONAL_API"
          #define AST_BUILDOPTS_ALL "OPTIONAL_API"
          EOF

      - name: pin pjproject version (from asterisk source)
        id: pjproject
        run: |
          # Pjproject pin lives in third-party/versions.mak as
          # PJPROJECT_VERSION=X.Y. Tracks whatever asterisk's bundle
          # would have used, so we stay in lockstep regardless of
          # which asterisk patch release we resolved to.
          VER=$(grep -E '^PJPROJECT_VERSION[[:space:]]*=' \
                  asterisk-src/third-party/versions.mak \
                | head -1 | cut -d= -f2 | tr -d ' \t')
          if [ -z "$VER" ]; then
            echo "::error::Could not extract PJPROJECT_VERSION from asterisk-src/third-party/versions.mak"
            exit 1
          fi
          echo "pjproject_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Pinned to pjproject ${VER}"

      - name: fetch pjproject headers
        run: |
          VER='${{ steps.pjproject.outputs.pjproject_version }}'
          wget -q "https://github.com/pjsip/pjproject/archive/refs/tags/${VER}.tar.gz" \
              -O pjproject.tgz
          tar xzf pjproject.tgz
          mv "pjproject-${VER}" pjproject
          # Force the K&R -> ANSI declaration fix on pjlib's
          # pj_thread_unregister. Stock pjproject (both 2.14 shipped
          # with asterisk 20.x and 2.16 shipped with 22.x/23.x) carries
          # the K&R form `pj_thread_unregister()` in pj/os.h, which
          # trips -Wstrict-prototypes under our -Werror build. Asterisk
          # ships an `0010-pj_thread_unregister_void.patch` in newer
          # branches (22.x+) to fix this, but 20.x doesn't carry it,
          # and CI resolves the asterisk tag at runtime so we can't
          # statically rely on the patch being present. Sed-fixing the
          # one-line declaration is version-independent and idempotent
          # (re-running matches nothing); the alternative is dropping
          # -Wstrict-prototypes from the Makefile, which would weaken
          # the warning for our own code too.
          sed -i 's|pj_thread_unregister()|pj_thread_unregister(void)|' \
              pjproject/pjlib/include/pj/os.h
          # pjproject's config.h #includes <pj/config_site.h> (user-
          # supplied; empty is fine) plus, when PJ_AUTOCONF is set,
          # pj/compat/os_auto.h + m_auto.h which configure generates.
          : > pjproject/pjlib/include/pj/config_site.h
          (cd pjproject && ./configure --disable-libwebrtc-aec >/dev/null)

      - name: build
        env:
          # Pjproject header set we just unpacked. PJPROJECT_DIR
          # below points the Makefile at asterisk-src/include for
          # asterisk headers (the only safe way to ensure struct
          # layouts match - asterisk-dev from apt is frequently
          # behind the live binary).
          PJPROJECT_INCLUDE: >-
            -DPJ_AUTOCONF=1
            -I${{ github.workspace }}/pjproject/pjlib/include
            -I${{ github.workspace }}/pjproject/pjlib-util/include
            -I${{ github.workspace }}/pjproject/pjnath/include
            -I${{ github.workspace }}/pjproject/pjmedia/include
            -I${{ github.workspace }}/pjproject/pjsip/include
        run: make PJPROJECT_DIR=${{ github.workspace }}/asterisk-src

      - name: verify .so files produced
        run: |
          for m in res_pjsip_cisco_endpoint \
                   res_pjsip_cisco_pidf_body_generator \
                   res_pjsip_cisco_register_optionsind \
                   res_pjsip_cisco_bulkupdate \
                   res_pjsip_cisco_unsolicited_blf \
                   res_pjsip_cisco_service_control \
                   res_pjsip_cisco_feature_events \
                   res_pjsip_cisco_call_extras \
                   res_pjsip_cisco_conference \
                   res_pjsip_cisco_remotecc; do
            test -f "$MODULE_BUILD_DIR/$m.so" || { echo "missing $m.so"; exit 1; }
            file "$MODULE_BUILD_DIR/$m.so" | grep -q "shared object"
          done

      - name: verify XML doc generated
        run: |
          test -f "$DOC_XML"
          xmllint --noout "$DOC_XML"

      - name: smoke test
        # tests/unit/smoke.sh xmllints the generated doc XML (already
        # done above, kept here for consistency) AND uses readelf to
        # confirm every .so has __mod_info + load_module + unload_module
        # symbols at the offsets Asterisk's loader resolves via dlsym
        # at registration. Catches the "module silently refuses to
        # register at startup" failure mode that previous CI couldn't
        # see without a running asterisk. binutils (readelf) +
        # libxml2-utils (xmllint) are already installed in the build-
        # deps step above.
        #
        # The pjproject-linked half of `make tests`
        # (tests/unit/test_string_utils) is skipped: CI ./configures
        # pjproject for headers but never `make`s it, so the static
        # libs aren't there to link against. The libxml2-only half
        # runs as its own step below.
        run: bash tests/unit/smoke.sh

      - name: build + run XML body well-formedness test
        # test_xml_bodies snprintfs each wire-format XML body template
        # (bulkupdate / MCID / Park toast / Park orbit / HLog) with
        # bench-realistic substitutions and parses the result with
        # libxml2. Catches sprintf typos (missing close tag, broken
        # attribute quote) that would otherwise only surface on the
        # bench. libxml2-only — no pjproject linkage.
        run: |
          make -C tests/unit test_xml_bodies
          ./tests/unit/test_xml_bodies

      - name: package check (Debian)
        env:
          PJPROJECT_INCLUDE: >-
            -DPJ_AUTOCONF=1
            -I${{ github.workspace }}/pjproject/pjlib/include
            -I${{ github.workspace }}/pjproject/pjlib-util/include
            -I${{ github.workspace }}/pjproject/pjnath/include
            -I${{ github.workspace }}/pjproject/pjmedia/include
            -I${{ github.workspace }}/pjproject/pjsip/include
          PJPROJECT_DIR: ${{ github.workspace }}/asterisk-src
        run: |
          # CI builds against a downloaded asterisk source tree, not the
          # apt asterisk-dev package, so the .deb's Build-Depends
          # (asterisk-dev) isn't installed here. -d skips the dependency
          # check; we only verify the packaging metadata is well-formed
          # and dpkg-buildpackage produces a .deb. PJPROJECT_DIR /
          # PJPROJECT_INCLUDE flow through the env into debian/rules ->
          # dh -> our Makefile.
          sudo apt-get install -y devscripts debhelper
          dpkg-buildpackage -us -uc -b -d

      # ----------------------------------------------------------
      # Module-load smoke against a real asterisk.
      #
      # Compile-time ABI breakage is caught by the build steps above.
      # Runtime load failure (sorcery type registration silently
      # failing, body-generator slot race losing to xpidf, missing
      # dlsym dependency, struct-offset SEGV during load) needs an
      # actual asterisk to surface.
      #
      # The runner's apt asterisk is exactly ONE major version
      # (whatever Canonical shipped with that ubuntu release). The
      # matrix maps each asterisk_branch to a runner that ships a
      # major-matching apt asterisk (ubuntu-22.04 jammy for the 20
      # cell, ubuntu-24.04 noble for the 22 cell). Asterisk 23 isn't
      # in any current Ubuntu release; that cell stays runtime-
      # skipped here, build-time ABI check still applies.
      #
      # Loading e.g. a 23-built .so into apt's 22.x binary is the
      # exact ABI-mismatch trap we tell operators to avoid
      # (CLAUDE.md) — SEGV at load or false-positive passing test.
      # So the load test is gated: only the matrix cell whose
      # asterisk_branch major matches what `apt-cache` reports for
      # `asterisk` runs the load steps. Other cells log "skipped
      # (no major-matching apt asterisk)" and move on. When Ubuntu
      # eventually ships asterisk 23 (or the LTS bumps), update the
      # runner mapping in the matrix.include above; the gate logic
      # here doesn't need to change.
      #
      # Patch-version drift inside one major (source 20.13 vs apt
      # 20.6) is accepted as low-risk: asterisk's LTS lines hold ABI
      # stable across minor/patch releases. Full coverage for all
      # matrix cells would require source-building asterisk per
      # cell (~5-10 min each) — out of scope here; see commit
      # history for the deliberation.
      # ----------------------------------------------------------

      - name: detect apt asterisk major version
        id: apt_asterisk
        run: |
          # apt-cache madison emits e.g. "asterisk | 1:20.6.0~dfsg+~cs6.13.40431414-1 | ..."
          # — the third field is the Debian version; strip the epoch
          # (everything before ':'), then take the major component.
          APT_VER=$(apt-cache madison asterisk 2>/dev/null \
                      | head -1 \
                      | awk -F'|' '{print $2}' \
                      | sed 's/^[[:space:]]*//;s/^[0-9]*://' \
                      | cut -d. -f1)
          if [ -z "$APT_VER" ]; then
            APT_VER="(none)"
          fi
          echo "apt asterisk major version: $APT_VER"
          echo "matrix asterisk branch:     ${{ matrix.asterisk_branch }}"
          echo "major=$APT_VER" >> "$GITHUB_OUTPUT"

      - name: install asterisk runtime + headers from apt
        # asterisk + asterisk-modules: the daemon and its PJSIP
        # module set (res_pjsip_pubsub, res_pjsip_session, the
        # xpidf body generator we slot-race, res_parking for the
        # remotecc Park path, res_pjsip_exten_state, etc).
        #
        # asterisk-dev: asterisk headers in lockstep with the apt
        # binary. Building against them produces .so files whose
        # symbol references match what the daemon actually exports
        # — including across patch-level renames like
        # ast_sip_push_task → __ast_sip_push_task that mid-20.x
        # picked up but apt's 20.6 doesn't carry.
        #
        # Note: pjproject has no -dev package on Debian/Ubuntu —
        # asterisk bundles pjproject statically into res_pjsip.so.
        # We reuse the pjproject headers fetched earlier in the
        # workflow; pjproject ABI is stable enough across minor
        # versions that the latest-pin we resolved is compatible
        # with whatever apt's asterisk was built against.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: |
          sudo apt-get install -y \
            asterisk asterisk-modules \
            asterisk-dev

      - name: rebuild + install modules against apt asterisk-dev
        # The earlier `make` step compiled against the resolved
        # upstream tag (e.g. 20.13.x). That's our compile-time-
        # against-latest signal and stays the load-bearing check
        # for ABI breakage in unreleased asterisk changes. But the
        # resulting .so files reference symbols as-named in that
        # tag, which may not match apt's older patch within the
        # same LTS major:
        #
        #   apt 20.6.0:  ast_sip_push_task         (function symbol)
        #   upstream 20.13+: __ast_sip_push_task   (renamed; old name
        #                                           became a macro)
        #
        # Rebuild without PJPROJECT_DIR so the Makefile picks up
        # /usr/include/asterisk from asterisk-dev (matching the
        # apt binary). PJPROJECT_INCLUDE still points at the
        # fetched pjproject headers (asterisk-dev does NOT ship
        # pjproject headers — see `install asterisk runtime`).
        #
        # `make clean && make && sudo make install` runs in one
        # step so PJPROJECT_INCLUDE stays in scope for all three
        # (sudo --preserve-env carries it through `sudo make
        # install`; the Makefile's check-headers prereq otherwise
        # re-runs and fails when it can't find pjproject).
        # ASTERISK_MODULES_DIR / ASTERISK_DOC_DIR auto-resolve
        # from /etc/asterisk/asterisk.conf via the Makefile.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        env:
          PJPROJECT_INCLUDE: >-
            -DPJ_AUTOCONF=1
            -I${{ github.workspace }}/pjproject/pjlib/include
            -I${{ github.workspace }}/pjproject/pjlib-util/include
            -I${{ github.workspace }}/pjproject/pjnath/include
            -I${{ github.workspace }}/pjproject/pjmedia/include
            -I${{ github.workspace }}/pjproject/pjsip/include
        run: |
          make clean
          make
          sudo --preserve-env=PJPROJECT_INCLUDE make install

      - name: install test pjsip.conf
        # Drop in a known-good pjsip.conf with a spread of [type=cisco]
        # sections so sorcery type registration + field validation runs
        # against real config. Apt's asterisk-config ships a default
        # pjsip.conf with a transport but no endpoints — overwriting it
        # is safe in the throwaway runner. Five endpoints (1010 / 1030 /
        # 1031 / 1032 / 1050) exercise every documented type=cisco field
        # at least once with a non-default value.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: sudo cp tests/ci/pjsip.conf /etc/asterisk/pjsip.conf

      - name: restart asterisk and wait for boot
        # `core waitfullybooted` is the hard barrier — without it
        # the verify step would race a still-loading asterisk.
        # We poll for the control socket first because systemctl
        # returns before asterisk is up enough to accept rasterisk
        # connections.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: |
          sudo systemctl restart asterisk
          for i in $(seq 1 30); do
            if sudo asterisk -rx 'core show version' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          sudo asterisk -rx 'core waitfullybooted'
          sudo asterisk -rx 'core show version'

      - name: verify all 10 cisco_* modules report Running
        # `module show like cisco_` prints a header line + body lines
        # + a "N modules loaded" trailer. Body lines that loaded ok
        # contain "Running"; failures show "Not Running" or similar.
        # We count and require 10. On failure we dump diagnostics
        # for the run log.
        #
        # Diagnostic dump on failure covers three layers:
        #   1) Are the .so files actually on disk and readable?
        #   2) What does asterisk think loaded? (`module show`)
        #   3) What did asterisk's own loader log? — this lives in
        #      /var/log/asterisk/full per Ubuntu's stock logger.conf,
        #      NOT in journalctl. systemd only captures stdout/stderr
        #      of the daemon process, which Asterisk doesn't use for
        #      its own log output. Without /var/log/asterisk/full the
        #      dlopen-time loader errors (undefined symbol, ABI
        #      mismatch, missing dependency) are invisible.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: |
          set +e
          output=$(sudo asterisk -rx 'module show like cisco_')
          echo "$output"
          running=$(echo "$output" | grep -c 'Running')
          if [ "$running" -ne 10 ]; then
            echo "::error::Expected 10 cisco_* modules Running, got $running"
            echo "--- ls /usr/lib/asterisk/modules/res_pjsip_cisco_*.so ---"
            sudo ls -la /usr/lib/asterisk/modules/res_pjsip_cisco_*.so 2>&1 || true
            echo "--- module load res_pjsip_cisco_endpoint.so (synchronous; surfaces dlopen error inline) ---"
            sudo asterisk -rx 'module load res_pjsip_cisco_endpoint.so' 2>&1 || true
            echo "--- /etc/asterisk/logger.conf ---"
            sudo cat /etc/asterisk/logger.conf 2>&1 || true
            echo "--- ls /var/log/asterisk/ ---"
            sudo ls -la /var/log/asterisk/ 2>&1 || true
            echo "--- module show (full) ---"
            sudo asterisk -rx 'module show'
            echo "--- /var/log/asterisk/*.log (Ubuntu names the file messages.log) ---"
            for f in /var/log/asterisk/*.log; do
              [ -f "$f" ] || continue
              echo "===== $f ====="
              sudo tail -n 200 "$f"
            done
            echo "--- journalctl asterisk.service ---"
            sudo journalctl -u asterisk --since '5 minutes ago' | tail -100
            echo "--- journalctl --identifier asterisk (syslog-tagged) ---"
            sudo journalctl --identifier asterisk --since '5 minutes ago' | tail -50
            exit 1
          fi
          echo "All 10 cisco_* modules Running."

      - name: verify type=cisco sorcery config loaded
        # Stock module-load tells us the .so files dlopened cleanly,
        # but doesn't prove sorcery accepted the [type=cisco] field
        # set we shipped in tests/ci/pjsip.conf. This step:
        #
        #   1) Confirms each expected endpoint is visible via
        #      `pjsip show endpoint X`.
        #   2) Confirms our own `pjsip cisco status X` reports
        #      type=cisco section: yes for each, meaning sorcery
        #      kept the section after validation.
        #   3) Greps the asterisk log for the specific failure modes
        #      that would surface if we'd shipped a sorcery field
        #      without its matching <configOption> XML block, or
        #      renamed a field without updating consumers.
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: |
          set -e
          for ext in 1010 1030 1031 1032 1050; do
            output=$(sudo asterisk -rx "pjsip show endpoint $ext")
            if ! echo "$output" | grep -q " $ext"; then
              echo "::error::endpoint $ext not loaded by asterisk"
              echo "$output"
              exit 1
            fi
            status=$(sudo asterisk -rx "pjsip cisco status $ext")
            if ! echo "$status" | grep -qE "type=cisco section: +yes"; then
              echo "::error::endpoint $ext has no type=cisco section per status"
              echo "$status"
              exit 1
            fi
          done
          # Failure modes the per-endpoint check above doesn't surface.
          # We grep messages.log because Ubuntu's logger.conf only writes
          # there (not journalctl) — see the verify-modules step.
          for f in /var/log/asterisk/*.log; do
            [ -f "$f" ] || continue
            if sudo grep -E "Cannot update type 'cisco'|failed to register sorcery type" "$f"; then
              echo "::error::sorcery validation errors in $f"
              exit 1
            fi
          done
          echo "All 5 type=cisco sections loaded; no sorcery errors logged."

      - name: check asterisk log for cisco-related errors/warnings
        # Sorcery type registration failures, helper symbol misses,
        # body-generator slot conflicts often log a WARNING / ERROR
        # before "module show" flips a module to Running. Catch them
        # here. Known-benign exception filtered out: stock
        # res_pjsip_xpidf_body_generator logs "A body generator for
        # application/cpim-pidf+xml is already registered" when our
        # cisco_pidf_body_generator wins the slot — intended (see
        # res/res_pjsip_cisco_pidf_body_generator.c's load_pri).
        if: steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: |
          set +e
          log=$(sudo journalctl -u asterisk --since '5 minutes ago' \
                  --no-pager --output cat)
          bad=$(echo "$log" \
                  | grep -E 'ERROR|WARNING' \
                  | grep -iE 'cisco' \
                  | grep -v 'body generator for application/cpim-pidf+xml is already')
          if [ -n "$bad" ]; then
            echo "::error::Cisco-related ERROR/WARNING in asterisk log:"
            echo "$bad"
            exit 1
          fi
          echo "No cisco-related ERROR/WARNING in asterisk log."

      - name: load test skipped (no major-matching apt asterisk)
        # Visible log line so a reviewer doesn't wonder why two of
        # three matrix cells silently skip the load steps.
        if: steps.apt_asterisk.outputs.major != matrix.asterisk_branch
        run: |
          echo "Module-load smoke skipped for asterisk-${{ matrix.asterisk_branch }}:"
          echo "  ${{ matrix.runner }} apt provides asterisk-${{ steps.apt_asterisk.outputs.major }} only."
          echo "  Build-time ABI compat for this matrix cell is still verified by the build above."

      - name: stop asterisk
        # Belt-and-braces cleanup — the runner is torn down anyway,
        # but explicit stop surfaces any shutdown-time warnings.
        if: always() && steps.apt_asterisk.outputs.major == matrix.asterisk_branch
        run: sudo systemctl stop asterisk || true
