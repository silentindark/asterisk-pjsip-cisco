; ----------------------------------------------------------------
; CI test extensions.conf — hints for the test endpoints in
; tests/ci/pjsip.conf, used by SUBSCRIBE-driven presence tests.
;
; Each Cisco endpoint gets a hint so asterisk's exten_state can
; report device state via Event: presence subscriptions. Single
; PJSIP/<endpoint> provider is enough; production deployments
; chain a PJSIP:<endpoint> presence provider for DND BLF support
; (see conf-samples/pjsip.conf.cisco-section.sample) but the
; tests don't exercise that path here.
; ----------------------------------------------------------------

[ci-test]

exten => 1010,hint,PJSIP/1010
exten => 1030,hint,PJSIP/1030
exten => 1031,hint,PJSIP/1031
exten => 1032,hint,PJSIP/1032
exten => 1050,hint,PJSIP/1050
