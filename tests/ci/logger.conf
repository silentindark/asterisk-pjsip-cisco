; CI test logger.conf — captures everything asterisk produces into
; files we can ship as failure artifacts. apt's stock logger.conf
; only writes notice/warning/error to messages.log and routes
; verbose / debug output to the console channel (which CI's
; non-interactive asterisk discards). For diagnosing things like
; the pjsip wire trace (verbose) or per-module on_rx_request
; decisions (debug), we need them in a file.

[general]

[logfiles]
messages.log => notice,warning,error
full.log     => notice,warning,error,verbose,debug,dtmf,fax
