; ----------------------------------------------------------------
; CI test pjsip.conf — feeds asterisk a spread of [type=cisco]
; sections so sorcery type registration + field validation actually
; runs against real config. Catches XML-doc drift (sorcery refuses
; to register a field when configOption is missing), schema rename
; regressions, and multi-section parsing edge cases.
;
; Stock [endpoint]/[aor]/[auth] sections are minimal — the goal is
; sorcery validation, not SIP reachability. No phone connects.
;
; Five Cisco endpoints, chosen for field breadth:
;
;   1010 — single-line, all defaults except subscribe= (BLF list)
;   1030 — multi-line primary (3 lines on one phone)
;   1031 — multi-line button 2 (aliases= cross-ref)
;   1032 — multi-line button 3 (aliases= cross-ref)
;   1050 — non-defaults (dnd_busy=yes, parkext=*99, keep_conference=yes)
;
; Together every documented type=cisco field is exercised at least
; once with a non-default value.
; ----------------------------------------------------------------

[system]
type = system
threadpool_max_size = 50

[transport-udp]
type = transport
protocol = udp
bind = 127.0.0.1:5160                ; non-default port — avoid clashing
                                     ; with anything else apt asterisk
                                     ; might bind to in the runner

; ----------------------------------------------------------------
; 1010 — single-line phone, default values + BLF list
; ----------------------------------------------------------------

[1010-auth]
type = auth
auth_type = userpass
username = 1010
password = ci-no-secret

[1010]
type = aor
max_contacts = 1

[1010]
type = endpoint
context = ci-test
disallow = all
allow = ulaw
aors = 1010
auth = 1010-auth

[1010]
type = cisco
line_index = 1
subscribe = 1030,1050
subscribe_context = ci-test

; ----------------------------------------------------------------
; 1030 / 1031 / 1032 — multi-line phone, three lines on one physical
; device. Each line is its own [type=endpoint], cross-linked via
; aliases= on the type=cisco sidecars.
; ----------------------------------------------------------------

[1030-auth]
type = auth
auth_type = userpass
username = 1030
password = ci-no-secret

[1030]
type = aor
max_contacts = 1

[1030]
type = endpoint
context = ci-test
disallow = all
allow = ulaw
aors = 1030
auth = 1030-auth

[1030]
type = cisco
line_index = 1
aliases = 1031,1032
subscribe = 1010,1050
subscribe_context = ci-test

[1031-auth]
type = auth
auth_type = userpass
username = 1031
password = ci-no-secret

[1031]
type = aor
max_contacts = 1

[1031]
type = endpoint
context = ci-test
disallow = all
allow = ulaw
aors = 1031
auth = 1031-auth

[1031]
type = cisco
line_index = 2
aliases = 1030,1032

[1032-auth]
type = auth
auth_type = userpass
username = 1032
password = ci-no-secret

[1032]
type = aor
max_contacts = 1

[1032]
type = endpoint
context = ci-test
disallow = all
allow = ulaw
aors = 1032
auth = 1032-auth

[1032]
type = cisco
line_index = 3
aliases = 1030,1031

; ----------------------------------------------------------------
; 1050 — non-default values: DND rejects as busy, custom park
; extension, keep_conference set so initiator-hangup leaves the
; remaining parties talking.
; ----------------------------------------------------------------

[1050-auth]
type = auth
auth_type = userpass
username = 1050
password = ci-no-secret

[1050]
type = aor
max_contacts = 1

[1050]
type = endpoint
context = ci-test
disallow = all
allow = ulaw
aors = 1050
auth = 1050-auth

[1050]
type = cisco
line_index = 1
subscribe = 1010,1030
subscribe_context = ci-test
dnd_busy = yes
parkext = *99
keep_conference = yes
